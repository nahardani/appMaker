<!DOCTYPE html>
<html lang="fa" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروژه‌ها</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css"/>
</head>
<body>
<div class="header"><h1>AppMaker — پروژه‌ها</h1><a th:href="@{/logout}">خروج</a></div>
<div class="container"><h2>ایجاد پروژه جدید</h2>
    <form th:action="@{/projects}" method="post" th:object="${form}">
        <label>نام پروژه</label><input type="text" th:field="*{projectName}" placeholder="مثلاً billing-service"
                                       required>
        <label>نام شرکت</label><input type="text" th:field="*{companyName}" placeholder="مثلاً yourorg" required>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">ایجاد پروژه جدید</button>
    </form>
    <h2 style="margin-top:28px;">پروژه‌های قبلی</h2>
    <table>
        <thead>
        <tr>
            <th>نام</th>
            <th>شرکت</th>
            <th>تاریخ</th>
            <th>مرحله</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${projects}">
            <td th:text="${p.projectName}">name</td>
            <td th:text="${p.companyName}">company</td>
            <td th:text="${#dates.format(p.createdAt, 'yyyy-MM-dd HH:mm')}">date</td>
            <td>
                <a class="btn" th:href="@{'/wizard/' + ${p.id} + '/java'}">ادامه ویرایش</a>

                <form th:action="@{'/projects/' + ${p.id} + '/delete'}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="btn btn-danger" type="submit" onclick="return confirm('حذف این پروژه؟')">حذف</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
