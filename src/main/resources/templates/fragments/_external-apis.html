<!-- templates/fragments/_external-apis.html -->
<div th:fragment="externalApis(project, apiForm, form, apiAuthTypes, apiKeyInOptions, httpMethodsApi)">
    <div class="card">
        <div class="card-head">
            <h3>وابستگی‌ها / APIهای خارجی</h3>
            <span class="muted">فعلاً فقط GET/POST</span>
        </div>

        <!-- Picker: انتخاب/ایجاد سرویس -->
        <form class="actions"
         th:action="@{'/wizard/' + ${project.id} + '/controllers'}"
         method="get" style="gap:8px">
            <input type="hidden" name="ctrl" th:value="${form != null ? form.name : null}"/>
            <input type="hidden" name="ep"   th:value="${form != null ? form.endpointIndex : null}"/>

            <label style="min-width:120px;margin:0">انتخاب سرویس</label>
            <select name="api" style="min-width:240px">
                <option value="">— ایجاد سرویس جدید —</option>
                <th:block th:if="${project.externalApis != null}">
                    <option th:each="c : ${project.externalApis.clients}"
                            th:value="${c.name}"
                            th:selected="${apiForm != null and apiForm.selectedName != null and apiForm.selectedName == c.name}"
                            th:text="${c.name}">SampleAPI</option>
                </th:block>
            </select>
            <button class="btn" type="submit">Load</button>
        </form>

        <div class="hr" style="margin:8px 0"></div>

        <!-- فرم اصلی سرویس خارجی -->
        <form class="form"
              th:object="${apiForm}"
              th:action="@{'/wizard/' + ${project.id} + '/settings/external-apis'}"
              method="post" id="apiForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="ctrl" th:value="${form != null ? form.name : null}"/>
            <input type="hidden" name="ep"   th:value="${form != null ? form.endpointIndex : null}"/>

            <div class="grid-3">
                <div>
                    <label>نام سرویس</label>
                    <input type="text" th:field="*{name}" placeholder="PaymentAPI" required/>
                </div>
                <div>
                    <label>Base URL</label>
                    <input type="text" th:field="*{baseUrl}" placeholder="https://api.example.com" required/>
                </div>
                <div>
                    <label>Auth</label>
                    <select th:field="*{authType}" id="apiAuthSelect" onchange="toggleAuthBoxes()">
                        <option th:each="a : ${apiAuthTypes}" th:value="${a}" th:text="${a}"></option>
                    </select>
                </div>
            </div>

            <!-- Auth boxes -->
            <div class="grid-3" id="auth_basic" style="display:none">
                <div>
                    <label>Basic Username</label>
                    <input type="text" th:field="*{basicUser}"/>
                </div>
                <div>
                    <label>Basic Password</label>
                    <input type="password" th:field="*{basicPass}"/>
                </div>
            </div>

            <div class="grid-1" id="auth_bearer" style="display:none">
                <div>
                    <label>Bearer Token</label>
                    <input type="text" th:field="*{bearerToken}"/>
                </div>
            </div>

            <div class="grid-3" id="auth_apikey" style="display:none">
                <div>
                    <label>API Key Name</label>
                    <input type="text" th:field="*{apiKeyName}" placeholder="X-API-Key"/>
                </div>
                <div>
                    <label>API Key Value</label>
                    <input type="text" th:field="*{apiKeyValue}"/>
                </div>
                <div>
                    <label>In</label>
                    <select th:field="*{apiKeyIn}">
                        <option th:each="opt : ${apiKeyInOptions}" th:value="${opt}" th:text="${opt}"></option>
                    </select>
                </div>
            </div>

            <div class="grid-3">
                <div>
                    <label>Timeout (ms)</label>
                    <input type="number" th:field="*{timeoutMs}" placeholder="8000"/>
                </div>
                <div>
                    <label>Rate limit (req/sec)</label>
                    <input type="number" th:field="*{rateLimitPerSec}" placeholder="10"/>
                </div>
            </div>

            <!-- Default Headers -->
            <div class="hr" style="margin:8px 0"></div>
            <h4>هدرهای پیش‌فرض</h4>
            <table class="table">
                <thead><tr><th>Key</th><th>Value</th><th></th></tr></thead>
                <tbody id="apiHeadersBody">
                <tr th:each="h, hi : *{defaultHeaders}">
                    <td><input type="text" th:field="*{defaultHeaders[__${hi.index}__].key}" placeholder="Accept"/></td>
                    <td><input type="text" th:field="*{defaultHeaders[__${hi.index}__].value}" placeholder="application/json"/></td>
                    <td><button class="btn btn-danger btn-sm" type="button" onclick="removeRow(this)">حذف</button></td>
                </tr>
                </tbody>
            </table>
            <div class="actions">
                <button type="button" class="btn btn-secondary" onclick="addHeaderRow()">+ افزودن هدر</button>
            </div>

            <!-- Endpoints -->
            <div class="hr" style="margin:8px 0"></div>
            <h4>Endpoints</h4>
            <table class="table" id="apiEndpointsTable">
                <thead>
                <tr><th>Method</th><th>Path</th><th>Query Params</th><th>Body (POST)</th><th></th></tr>
                </thead>
                <tbody id="apiEndpointsBody">
                <tr th:each="e, ei : *{endpoints}">
                    <td>
                        <select th:field="*{endpoints[__${ei.index}__].method}">
                            <option th:each="m : ${httpMethodsApi}" th:value="${m}" th:text="${m}"></option>
                        </select>
                    </td>
                    <td>
                        <input type="text" th:field="*{endpoints[__${ei.index}__].path}" placeholder="/orders/{id}"/>
                    </td>
                    <td>
                        <button class="btn btn-sm" type="button" th:onclick="'openQModal('+__${ei.index}__+')'">Params…</button>
                        <!-- hidden sync -->
                        <div th:id="${'qHidden_'+ei.index}">
                            <input type="hidden" th:each="q, qi : *{endpoints[__${ei.index}__].queryParams}"
                                   th:name="${'endpoints['+ei.index+'].queryParams['+qi.index+'].name'}"     th:value="${q.name}"/>
                            <input type="hidden" th:each="q, qi : *{endpoints[__${ei.index}__].queryParams}"
                                   th:name="${'endpoints['+ei.index+'].queryParams['+qi.index+'].example'}"  th:value="${q.example}"/>
                            <input type="hidden" th:each="q, qi : *{endpoints[__${ei.index}__].queryParams}"
                                   th:name="${'endpoints['+ei.index+'].queryParams['+qi.index+'].required'}" th:value="${q.required}"/>
                        </div>
                    </td>
                    <td>
                        <button class="btn btn-sm" type="button" th:onclick="'openBodyModal('+__${ei.index}__+')'">Body fields…</button>
                        <div th:id="${'bHidden_'+ei.index}">
                            <input type="hidden" th:each="b, bi : *{endpoints[__${ei.index}__].bodyFields}"
                                   th:name="${'endpoints['+ei.index+'].bodyFields['+bi.index+'].name'}"     th:value="${b.name}"/>
                            <input type="hidden" th:each="b, bi : *{endpoints[__${ei.index}__].bodyFields}"
                                   th:name="${'endpoints['+ei.index+'].bodyFields['+bi.index+'].type'}"     th:value="${b.type}"/>
                            <input type="hidden" th:each="b, bi : *{endpoints[__${ei.index}__].bodyFields}"
                                   th:name="${'endpoints['+ei.index+'].bodyFields['+bi.index+'].required'}" th:value="${b.required}"/>
                        </div>
                    </td>
                    <td>
                        <button class="btn btn-danger btn-sm" type="button" onclick="removeRow(this)">حذف</button>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="actions">
                <button type="button" class="btn btn-secondary" onclick="addEndpointRow()">+ افزودن Endpoint</button>
            </div>

            <div class="actions" style="justify-content:flex-end; margin-top:8px;">
                <button type="submit" class="btn btn-primary">ذخیره سرویس خارجی</button>
            </div>
        </form>

        <!-- حذف سرویس -->
        <form th:if="${apiForm != null and apiForm.name != null}"
              th:action="@{'/wizard/' + ${project.id} + '/settings/external-apis/delete'}"
              method="post" class="actions" style="justify-content:flex-end;margin-top:8px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="name" th:value="${apiForm.name}"/>
            <input type="hidden" name="ctrl" th:value="${form != null ? form.name : null}"/>
            <input type="hidden" name="ep"   th:value="${form != null ? form.endpointIndex : null}"/>
            <button class="btn btn-danger" type="submit"
                    th:attr="onclick=|return confirm('حذف سرویس «${apiForm.name}»؟');|">حذف سرویس</button>
        </form>
    </div>

    <!-- مودال Params -->
    <div class="modal" id="qModal" style="display:none">
        <div class="dialog">
            <h4>Query Params</h4>
            <input type="hidden" id="q_idx"/>
            <table class="table" id="qTable">
                <thead><tr><th>name</th><th>example</th><th>required</th><th></th></tr></thead>
                <tbody></tbody>
            </table>
            <div class="actions">
                <button class="btn btn-secondary" type="button" onclick="addQRow()">+ add</button>
                <div class="spacer"></div>
                <button class="btn" type="button" onclick="closeQ()">Cancel</button>
                <button class="btn btn-primary" type="button" onclick="saveQ()">Save</button>
            </div>
        </div>
    </div>

    <!-- مودال Body -->
    <div class="modal" id="bModal" style="display:none">
        <div class="dialog">
            <h4>Body fields (POST)</h4>
            <input type="hidden" id="b_idx"/>
            <table class="table" id="bTable">
                <thead><tr><th>name</th><th>type</th><th>required</th><th></th></tr></thead>
                <tbody></tbody>
            </table>
            <div class="actions">
                <button class="btn btn-secondary" type="button" onclick="addBRow()">+ add</button>
                <div class="spacer"></div>
                <button class="btn" type="button" onclick="closeB()">Cancel</button>
                <button class="btn btn-primary" type="button" onclick="saveB()">Save</button>
            </div>
        </div>
    </div>

    <script  th:inline="none">
        function $(id){ return document.getElementById(id); }
        function removeRow(btn){ btn.closest('tr').remove(); }

        function addHeaderRow(){
            var body = document.getElementById('apiHeadersBody');
            var idx = body.querySelectorAll('tr').length;
            var tr = document.createElement('tr');
            tr.innerHTML = `
        <td><input type="text" name="defaultHeaders[${idx}].key" placeholder="Accept"></td>
        <td><input type="text" name="defaultHeaders[${idx}].value" placeholder="application/json"></td>
        <td><button class="btn btn-danger btn-sm" type="button" onclick="removeRow(this)">حذف</button></td>`;
            body.appendChild(tr);
        }

        function addEndpointRow(){
            var body = document.getElementById('apiEndpointsBody');
            var idx = body.querySelectorAll('tr').length;
            var tr = document.createElement('tr');
            tr.innerHTML = `
        <td>
          <select name="endpoints[${idx}].method">
            <option value="GET">GET</option><option value="POST">POST</option>
          </select>
        </td>
        <td><input type="text" name="endpoints[${idx}].path" placeholder="/orders/{id}"></td>
        <td>
          <button class="btn btn-sm" type="button" onclick="openQModal(${idx})">Params…</button>
          <div id="qHidden_${idx}"></div>
        </td>
        <td>
          <button class="btn btn-sm" type="button" onclick="openBodyModal(${idx})">Body fields…</button>
          <div id="bHidden_${idx}"></div>
        </td>
        <td><button class="btn btn-danger btn-sm" type="button" onclick="removeRow(this)">حذف</button></td>`;
            body.appendChild(tr);
        }

        function toggleAuthBoxes(){
            var v = document.getElementById('apiAuthSelect').value || 'NONE';
            document.getElementById('auth_basic').style.display  = (v==='BASIC' ? '' : 'none');
            document.getElementById('auth_bearer').style.display = (v==='BEARER'? '' : 'none');
            document.getElementById('auth_apikey').style.display = (v==='API_KEY'? '' : 'none');
        }
        document.addEventListener('DOMContentLoaded', toggleAuthBoxes);

        // ----- Query Params modal -----
        function openQModal(i){
            $('q_idx').value = i;
            var hidden = $('qHidden_'+i);
            var rows = [];
            hidden.querySelectorAll('input').forEach(function(inp){
                var m = inp.name.match(/queryParams\\[(\\d+)]\\.(name|example|required)/);
                if (!m) return;
                var idx = +m[1], k = m[2];
                rows[idx] = rows[idx] || {name:'',example:'',required:false};
                rows[idx][k] = (k==='required') ? (inp.value==='true' || inp.value==='on') : inp.value;
            });
            var body = $('qTable').querySelector('tbody');
            body.innerHTML='';
            (rows.length?rows:[{name:'',example:'',required:false}]).forEach(function(r){
                var tr = document.createElement('tr');
                tr.innerHTML = `
          <td><input type="text" value="${r.name||''}"></td>
          <td><input type="text" value="${r.example||''}"></td>
          <td class="center"><input type="checkbox" ${r.required?'checked':''}></td>
          <td><button class="btn btn-danger btn-sm" type="button" onclick="removeRow(this)">حذف</button></td>`;
                body.appendChild(tr);
            });
            $('qModal').style.display='flex';
        }
        function addQRow(){
            var body = $('qTable').querySelector('tbody');
            var tr = document.createElement('tr');
            tr.innerHTML = `
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td class="center"><input type="checkbox"></td>
        <td><button class="btn btn-danger btn-sm" type="button" onclick="removeRow(this)">حذف</button></td>`;
            body.appendChild(tr);
        }
        function closeQ(){ $('qModal').style.display='none'; }
        function saveQ(){
            var i = +$('q_idx').value;
            var hidden = $('qHidden_'+i);
            hidden.innerHTML='';
            var body = $('qTable').querySelector('tbody');
            body.querySelectorAll('tr').forEach(function(tr, idx){
                var name = tr.querySelectorAll('input')[0].value.trim();
                var ex   = tr.querySelectorAll('input')[1].value;
                var req  = tr.querySelectorAll('input')[2].checked;
                if (!name) return;
                hidden.insertAdjacentHTML('beforeend', `
          <input type="hidden" name="endpoints[${i}].queryParams[${idx}].name" value="${name}">
          <input type="hidden" name="endpoints[${i}].queryParams[${idx}].example" value="${ex||''}">
          <input type="hidden" name="endpoints[${i}].queryParams[${idx}].required" value="${req}">
        `);
            });
            closeQ();
        }

        // ----- Body fields modal -----
        function openBodyModal(i){
            $('b_idx').value = i;
            var hidden = $('bHidden_'+i);
            var rows = [];
            hidden.querySelectorAll('input').forEach(function(inp){
                var m = inp.name.match(/bodyFields\\[(\\d+)]\\.(name|type|required)/);
                if (!m) return;
                var idx = +m[1], k = m[2];
                rows[idx] = rows[idx] || {name:'',type:'String',required:false};
                rows[idx][k] = (k==='required') ? (inp.value==='true'||inp.value==='on') : inp.value;
            });
            var body = $('bTable').querySelector('tbody');
            body.innerHTML='';
            (rows.length?rows:[{name:'',type:'String',required:false}]).forEach(function(r){
                var tr = document.createElement('tr');
                tr.innerHTML = `
          <td><input type="text" value="${r.name||''}"></td>
          <td>
            <select>
              <option ${r.type==='String'?'selected':''}>String</option>
              <option ${r.type==='Long'?'selected':''}>Long</option>
              <option ${r.type==='Integer'?'selected':''}>Integer</option>
              <option ${r.type==='Double'?'selected':''}>Double</option>
              <option ${r.type==='Boolean'?'selected':''}>Boolean</option>
              <option ${r.type==='UUID'?'selected':''}>UUID</option>
              <option ${r.type==='LocalDate'?'selected':''}>LocalDate</option>
              <option ${r.type==='LocalDateTime'?'selected':''}>LocalDateTime</option>
            </select>
          </td>
          <td class="center"><input type="checkbox" ${r.required?'checked':''}></td>
          <td><button class="btn btn-danger btn-sm" type="button" onclick="removeRow(this)">حذف</button></td>`;
                body.appendChild(tr);
            });
            $('bModal').style.display='flex';
        }
        function addBRow(){
            var body = $('bTable').querySelector('tbody');
            var tr = document.createElement('tr');
            tr.innerHTML = `
        <td><input type="text"></td>
        <td>
          <select>
            <option>String</option><option>Long</option><option>Integer</option><option>Double</option>
            <option>Boolean</option><option>UUID</option><option>LocalDate</option><option>LocalDateTime</option>
          </select>
        </td>
        <td class="center"><input type="checkbox"></td>
        <td><button class="btn btn-danger btn-sm" type="button" onclick="removeRow(this)">حذف</button></td>`;
            body.appendChild(tr);
        }
        function closeB(){ $('bModal').style.display='none'; }
        function saveB(){
            var i = +$('b_idx').value;
            var hidden = $('bHidden_'+i);
            hidden.innerHTML='';
            var body = $('bTable').querySelector('tbody');
            body.querySelectorAll('tr').forEach(function(tr, idx){
                var name = tr.querySelectorAll('input')[0].value.trim();
                var type = tr.querySelector('select').value;
                var req  = tr.querySelectorAll('input')[1].checked;
                if (!name) return;
                hidden.insertAdjacentHTML('beforeend', `
          <input type="hidden" name="endpoints[${i}].bodyFields[${idx}].name" value="${name}">
          <input type="hidden" name="endpoints[${i}].bodyFields[${idx}].type" value="${type}">
          <input type="hidden" name="endpoints[${i}].bodyFields[${idx}].required" value="${req}">
        `);
            });
            closeB();
        }
    </script>
</div>
