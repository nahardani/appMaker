<!— fragments/_endpoint.html —>
<section th:fragment="endpoint(project, form)">
    <div class="card" th:if="${form.editing}">
        <div class="card-head"><h3>Endpoint</h3></div>

        <form class="form"
              th:action="@{'/wizard/' + ${project.id} + '/controllers/endpoint'}"
              th:object="${form}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{name}"/>
            <input type="hidden" th:field="*{endpointIndex}"/>
            <input type="hidden" th:field="*{httpMethod}" id="httpMethodHidden"/>

            <div class="grid-3">
                <div>
                    <label>استفاده از مسیر نسبی نسبت به Base Path</label>
                    <div class="inline">
                        <input type="checkbox" th:field="*{useEndpointPath}" id="usePathChk"/>
                        <input type="text" th:field="*{endpointPath}" id="endpointPath" placeholder="/{id} یا /search"/>
                    </div>
                </div>
                <div>
                    <label>نام متد جاوا</label>
                    <input type="text" th:field="*{endpointName}" placeholder="getById"/>
                </div>
                <div></div>
            </div>

            <div class="right">
                <button type="submit" class="btn btn-primary">ذخیره Endpoint</button>
            </div>
        </form>
    </div>
</section>
