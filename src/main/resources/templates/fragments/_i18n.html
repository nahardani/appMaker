<!-- templates/fragments/_i18n.html -->
<div th:fragment="i18n(project, i18nForm, form)">
    <div class="card">
        <div class="card-head"><h3>تنظیمات چندزبانه (i18n)</h3></div>

        <form class="form"
              th:object="${i18nForm}"
              th:action="@{'/wizard/' + ${project.id} + '/settings/i18n'}"
              method="post"
              id="i18nForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <!-- برای ماندن روی همان کنترلر/اندپوینت بعد از ذخیره -->
            <input type="hidden" name="ctrl" th:value="${form != null ? form.name : null}"/>
            <input type="hidden" name="ep"   th:value="${form != null ? form.endpointIndex : null}"/>

            <div class="grid-3">
                <div>
                    <label>زبان پیش‌فرض</label>
                    <input type="text" th:field="*{defaultLocale}" placeholder="fa"/>
                </div>
                <div>
                    <label>لیست زبان‌ها (CSV)</label>
                    <input type="text" th:field="*{localesCsv}" id="localesCsv" placeholder="fa,en"/>
                </div>
                <div>
                    <label>Base name</label>
                    <input type="text" th:field="*{baseName}" placeholder="messages"/>
                </div>
            </div>

            <div class="hr" style="margin:8px 0"></div>
            <h4>کلیدهای اولیهٔ ترجمه</h4>

            <div class="actions" style="margin-bottom:8px;">
                <button type="button" class="btn btn-secondary" onclick="i18nAddKeyRow()">+ افزودن کلید</button>
            </div>

            <table class="table" id="i18nKeysTable">
                <thead>
                <tr id="i18nKeysHead">
                    <th>کُد</th>
                    <!-- ستون‌های زبان‌ها با JS اضافه می‌شود -->
                    <th style="width:1%"></th>
                </tr>
                </thead>
                <tbody id="i18nKeysBody">
                <!-- ردیف‌ها با JS ساخته می‌شوند -->
                </tbody>
            </table>

            <!-- داده‌های موجود (بدون JSON) -->
            <div id="i18nExisting" style="display:none">
                <input type="hidden" id="i18n_defaultLocale" th:value="*{defaultLocale}"/>
                <input type="hidden" id="i18n_localesCsv"  th:value="*{localesCsv}"/>

                <div th:each="k, idxStat : *{keys}">
                    <input type="hidden" th:id="${'key_'+idxStat.index+'_code'}" th:value="${k.code}"/>
                    <th:block th:with="locs=${#strings.arraySplit(i18nForm.localesCsv, ',')}">
                        <input type="hidden"
                               th:each="loc : ${locs}"
                               th:id="${'key_'+idxStat.index+'_t_' + ${#strings.trim(loc)}}"
                               th:value="${k.translations[#strings.trim(loc)]}"/>
                    </th:block>
                </div>
            </div>

            <div class="actions" style="justify-content:flex-end; margin-top:8px;">
                <button type="submit" class="btn btn-primary">ذخیره i18n</button>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        (function(){
            function parseLocales(){
                var csv = document.getElementById('localesCsv').value || '';
                return csv.split(',').map(function(s){ return s.trim(); }).filter(function(s){return s.length>0;});
            }

            function rebuildHead(){
                var head = document.getElementById('i18nKeysHead');
                while (head.children.length > 2) head.removeChild(head.children[1]);
                parseLocales().forEach(function(loc){
                    var th = document.createElement('th');
                    th.textContent = 'ترجمه (' + loc + ')';
                    head.insertBefore(th, head.lastElementChild);
                });
            }

            function newRow(index, code, translations){
                var locales = parseLocales();
                var tr = document.createElement('tr');

                var tdCode = document.createElement('td');
                var inpCode = document.createElement('input');
                inpCode.type = 'text';
                inpCode.name = 'keys['+index+'].code';
                inpCode.value = code || '';
                tdCode.appendChild(inpCode);
                tr.appendChild(tdCode);

                locales.forEach(function(loc){
                    var td = document.createElement('td');
                    var inp = document.createElement('input');
                    inp.type = 'text';
                    inp.name = 'keys['+index+'].translations['+loc+']';
                    inp.value = (translations && translations[loc]) ? translations[loc] : '';
                    td.appendChild(inp);
                    tr.appendChild(td);
                });

                var tdDel = document.createElement('td');
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'btn btn-danger btn-sm';
                btn.textContent = 'حذف';
                btn.onclick = function(){ tr.remove(); renumberRows(); };
                tdDel.appendChild(btn);
                tr.appendChild(tdDel);

                return tr;
            }

            function renumberRows(){
                var body = document.getElementById('i18nKeysBody');
                body.querySelectorAll('tr').forEach(function(tr, idx){
                    tr.querySelectorAll('input').forEach(function(inp){
                        inp.name = inp.name.replace(/keys\[\d+\]/, 'keys['+idx+']');
                    });
                });
            }

            window.i18nAddKeyRow = function(){
                var body = document.getElementById('i18nKeysBody');
                var idx = body.querySelectorAll('tr').length;
                body.appendChild(newRow(idx, '', {}));
            }

            function rebuildRowsKeepData(){
                var body = document.getElementById('i18nKeysBody');
                var existing = [];
                body.querySelectorAll('tr').forEach(function(tr){
                    var row = { code: '', translations:{} };
                    tr.querySelectorAll('input').forEach(function(inp){
                        if (inp.name.endsWith('.code')) {
                            row.code = inp.value;
                        } else {
                            var m = inp.name.match(/translations\[(.+?)\]/);
                            if (m) row.translations[m[1]] = inp.value;
                        }
                    });
                    existing.push(row);
                });

                rebuildHead();
                body.innerHTML = '';
                existing.forEach(function(r, i){
                    body.appendChild(newRow(i, r.code, r.translations));
                });
            }

            document.getElementById('localesCsv').addEventListener('change', rebuildRowsKeepData);

            // رندر اولیه
            rebuildHead();

            // Hydrate از hidden ها
            (function hydrate(){
                var body = document.getElementById('i18nKeysBody');
                var locales = parseLocales();
                var idx = 0;
                while (true) {
                    var codeEl = document.getElementById('key_' + idx + '_code');
                    if (!codeEl) break;
                    var code = codeEl.value || '';
                    var translations = {};
                    locales.forEach(function(loc){
                        var tEl = document.getElementById('key_' + idx + '_t_' + loc);
                        translations[loc] = tEl ? (tEl.value || '') : '';
                    });
                    body.appendChild(newRow(body.querySelectorAll('tr').length, code, translations));
                    idx++;
                }
                if (body.children.length === 0) {
                    body.appendChild(newRow(0, '', {}));
                }
            })();
        })();
        /*]]>*/
    </script>
</div>
