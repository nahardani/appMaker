<!-- templates/fragments/_i18n.html -->
<div th:fragment="i18n(project, i18nForm, form)">
    <div class="card">
        <div class="card-head"><h3>تنظیمات چندزبانه (i18n)</h3></div>

        <form class="form"
              th:object="${i18nForm}"
              th:action="@{'/wizard/' + ${project.id} + '/settings/i18n'}"
              method="post"
              id="i18nForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <!-- برای ماندن روی همان کنترلر/اندپوینت پس از ذخیره -->
            <input type="hidden" name="ctrl" th:value="${form != null ? form.name : null}"/>
            <input type="hidden" name="ep"   th:value="${form != null ? form.endpointIndex : null}"/>

            <div class="grid-3">
                <div>
                    <label>زبان پیش‌فرض</label>
                    <input type="text" th:field="*{defaultLang}" placeholder="fa"/>
                </div>
                <div>
                    <label>فهرست زبان‌ها (CSV)</label>
                    <!-- این فیلد به فرم بایند نیست؛ کنترلر آن را به form.languages مپ می‌کند -->
                    <input type="text" id="languagesCsv" name="languagesCsv"
                           th:value="${i18nForm.languages != null ? #strings.listJoin(i18nForm.languages, ',') : ''}"
                           placeholder="fa,en"/>
                </div>
                <div>
                    <label>Base name</label>
                    <input type="text" th:field="*{baseName}" placeholder="messages"/>
                </div>
            </div>

            <div class="hr" style="margin:8px 0"></div>
            <h4>کلیدهای اولیهٔ ترجمه</h4>

            <div class="actions" style="margin-bottom:8px;">
                <button type="button" class="btn btn-secondary" onclick="i18nAddKeyRow()">+ افزودن کلید</button>
            </div>

            <table class="table" id="i18nKeysTable">
                <thead>
                <tr id="i18nKeysHead">
                    <th>کلید</th>
                    <!-- ستون‌های زبان با JS ساخته می‌شود -->
                    <th style="width:1%"></th>
                </tr>
                </thead>
                <tbody id="i18nKeysBody"></tbody>
            </table>

            <!-- داده‌ی موجود برای Hydration -->
            <div id="i18nExisting" style="display:none">
                <input type="hidden" id="i18n_defaultLang" th:value="*{defaultLang}"/>
                <input type="hidden" id="i18n_languagesCsv"
                       th:value="${i18nForm.languages != null ? #strings.listJoin(i18nForm.languages, ',') : ''}"/>

                <div th:each="k, idx : *{keys}">
                    <input type="hidden" th:id="${'key_'+idx.index+'_key'}" th:value="${k.key}"/>
                    <th:block th:with="langs=${i18nForm.languages}">
                        <input type="hidden"
                               th:each="lng : ${langs}"
                               th:id="${'key_'+idx.index+'_t_' + ${lng}}"
                               th:value="${k.translations[lng]}"/>
                    </th:block>
                </div>
            </div>

            <div class="actions" style="justify-content:flex-end; margin-top:8px;">
                <button type="submit" class="btn btn-primary">ذخیره i18n</button>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        (function(){
            function parseLangs(){
                var csv = document.getElementById('languagesCsv').value || '';
                return csv.split(',').map(function(s){return s.trim();}).filter(function(s){return s.length>0;});
            }

            function rebuildHead(){
                var head = document.getElementById('i18nKeysHead');
                while (head.children.length > 2) head.removeChild(head.children[1]);
                parseLangs().forEach(function(lng){
                    var th = document.createElement('th');
                    th.textContent = 'ترجمه (' + lng + ')';
                    head.insertBefore(th, head.lastElementChild);
                });
            }

            function newRow(index, key, translations){
                var langs = parseLangs();
                var tr = document.createElement('tr');

                var tdKey = document.createElement('td');
                var inpKey = document.createElement('input');
                inpKey.type = 'text';
                inpKey.name = 'keys['+index+'].key';
                inpKey.value = key || '';
                tdKey.appendChild(inpKey);
                tr.appendChild(tdKey);

                langs.forEach(function(lng){
                    var td = document.createElement('td');
                    var inp = document.createElement('input');
                    inp.type = 'text';
                    inp.name = 'keys['+index+'].translations['+lng+']';
                    inp.value = (translations && translations[lng]) ? translations[lng] : '';
                    td.appendChild(inp);
                    tr.appendChild(td);
                });

                var tdDel = document.createElement('td');
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'btn btn-danger btn-sm';
                btn.textContent = 'حذف';
                btn.onclick = function(){ tr.remove(); renumberRows(); };
                tdDel.appendChild(btn);
                tr.appendChild(tdDel);

                return tr;
            }

            function renumberRows(){
                var body = document.getElementById('i18nKeysBody');
                body.querySelectorAll('tr').forEach(function(tr, idx){
                    tr.querySelectorAll('input').forEach(function(inp){
                        inp.name = inp.name.replace(/keys\[\d+\]/, 'keys['+idx+']');
                    });
                });
            }

            window.i18nAddKeyRow = function(){
                var body = document.getElementById('i18nKeysBody');
                var idx = body.querySelectorAll('tr').length;
                body.appendChild(newRow(idx, '', {}));
            };

            function rebuildRowsKeepData(){
                var body = document.getElementById('i18nKeysBody');
                var existing = [];
                body.querySelectorAll('tr').forEach(function(tr){
                    var row = { key:'', translations:{} };
                    tr.querySelectorAll('input').forEach(function(inp){
                        if (inp.name.endsWith('.key')) {
                            row.key = inp.value;
                        } else {
                            var m = inp.name.match(/translations\[(.+?)\]/);
                            if (m) row.translations[m[1]] = inp.value;
                        }
                    });
                    existing.push(row);
                });
                rebuildHead();
                body.innerHTML = '';
                existing.forEach(function(r,i){ body.appendChild(newRow(i, r.key, r.translations)); });
            }

            document.getElementById('languagesCsv').addEventListener('change', rebuildRowsKeepData);

            // initial render
            rebuildHead();

            (function hydrate(){
                var body = document.getElementById('i18nKeysBody');
                var langsCsv = document.getElementById('i18n_languagesCsv').value || '';
                document.getElementById('languagesCsv').value = langsCsv;
                rebuildHead();

                var idx = 0;
                while (true){
                    var keyEl = document.getElementById('key_'+idx+'_key');
                    if (!keyEl) break;
                    var key = keyEl.value || '';
                    var translations = {};
                    (langsCsv.split(',').map(function(s){return s.trim();}).filter(Boolean)).forEach(function(lng){
                        var tEl = document.getElementById('key_'+idx+'_t_'+lng);
                        translations[lng] = tEl ? (tEl.value || '') : '';
                    });
                    body.appendChild(newRow(body.querySelectorAll('tr').length, key, translations));
                    idx++;
                }
                if (body.children.length === 0) body.appendChild(newRow(0,'',{}));
            })();
        })();
        /*]]>*/
    </script>
</div>
