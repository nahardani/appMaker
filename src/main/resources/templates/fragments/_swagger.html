<!-- templates/fragments/_swagger.html -->
<div th:fragment="swagger(project, swaggerForm, form)">
    <div class="card">
        <div class="card-head"><h3>تنظیمات Swagger / OpenAPI</h3></div>

        <form class="form"
              th:object="${swaggerForm}"
              th:action="@{'/wizard/' + ${project.id} + '/settings/swagger'}"
              method="post">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <!-- برای برگشت به همان کنترلر/اندپوینت پس از ذخیره -->
            <input type="hidden" name="ctrl" th:value="${form != null ? form.name : null}"/>
            <input type="hidden" name="ep"   th:value="${form != null ? form.endpointIndex : null}"/>

            <div class="grid-3">
                <div>
                    <label>عنوان</label>
                    <input type="text" th:field="*{title}" placeholder="Project API"/>
                </div>
                <div>
                    <label>نسخه</label>
                    <input type="text" th:field="*{version}" placeholder="v1"/>
                </div>
                <div>
                    <label>مسیر UI</label>
                    <input type="text" th:field="*{uiPath}" placeholder="/swagger-ui"/>
                </div>
            </div>

            <div class="grid-3">
                <div>
                    <label>فعال باشد؟</label>
                    <select th:field="*{enabled}">
                        <option th:value="true">بله</option>
                        <option th:value="false">خیر</option>
                    </select>
                </div>
                <div>
                    <label>گروه‌بندی پیش‌فرض</label>
                    <input type="text" th:field="*{defaultGroup}" placeholder="orders, users, ..."/>
                </div>
                <div>
                    <label>توضیحات (اختیاری)</label>
                    <input type="text" th:field="*{description}" placeholder="..." />
                </div>
            </div>

            <div class="grid-3">
                <div>
                    <label>Contact Name</label>
                    <input type="text" th:field="*{contactName}" placeholder="Team"/>
                </div>
                <div>
                    <label>Contact Email</label>
                    <input type="email" th:field="*{contactEmail}" placeholder="dev@example.com"/>
                </div>
                <div>
                    <label>License</label>
                    <input type="text" th:field="*{licenseName}" placeholder="Apache-2.0"/>
                </div>
            </div>

            <div class="grid-1">
                <div>
                    <label>License URL</label>
                    <input type="text" th:field="*{licenseUrl}" placeholder="https://www.apache.org/licenses/LICENSE-2.0"/>
                </div>
            </div>

            <div class="actions" style="justify-content:flex-end">
                <button class="btn btn-primary" type="submit">ذخیره Swagger</button>
            </div>
        </form>
    </div>
</div>
